<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EYE GATE - Sistema Inteligente de Controle</title>
  <style>
    :root { --amarelo: #facc15; --preto: #111827; }
    body { 
      font-family: Arial, sans-serif; 
      background: #f8fafc; 
      margin: 0; 
      padding: 0; 
    }
    header { 
      background: var(--preto); 
      color: white; 
      text-align: center; 
      padding: 40px 20px; 
    }
    .logo { font-size: 120px; margin-bottom: 10px; }
    .container { 
      max-width: 1100px; 
      margin: 40px auto; 
      padding: 20px; 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 30px; 
    }
    .card { 
      background: white; 
      padding: 35px; 
      border-radius: 16px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
      text-align: center; 
    }
    button { 
      background: var(--amarelo); 
      color: black; 
      border: none; 
      padding: 16px 40px; 
      font-size: 1.1rem; 
      font-weight: bold; 
      border-radius: 10px; 
      cursor: pointer; 
      margin-top: 20px; 
    }
    button:hover { background: #eab308; }
    #modal { 
      display: none; 
      position: fixed; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      background: rgba(0,0,0,0.8); 
      z-index: 1000; 
      align-items: center; 
      justify-content: center; 
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">👁️</div>
    <h1>EYE GATE</h1>
    <p>Sistema Inteligente de Controle Facial</p>
  </header>

  <div class="container">
    <div class="card">
      <h2>🔄 Novo Cadastro</h2>
      <p>Registre novos alunos no sistema</p>
      <button onclick="abrirModal()">INICIAR CADASTRO →</button>
    </div>

    <div class="card">
      <h2>👥 Alunos Cadastrados</h2>
      <p id="status">Clique em Atualizar para ver</p>
      <button onclick="carregarAlunos()">ATUALIZAR LISTA</button>
    </div>
  </div>

  <!-- Modal de Cadastro -->
  <div id="modal">
    <div style="background:white; padding:30px; border-radius:16px; width:90%; max-width:580px; max-height:90vh; overflow:auto;">
      <h2>Novo Cadastro de Aluno</h2><br>
      
      <label>Nome completo:</label>
      <input type="text" id="nome" style="width:100%; padding:12px; margin:8px 0 16px;" placeholder="Ex: João Silva">

      <label>CGM:</label>
      <input type="text" id="cgm" style="width:100%; padding:12px; margin:8px 0 16px;" placeholder="Ex: 12345678">

      <label>Turma:</label>
      <input type="text" id="turma" style="width:100%; padding:12px; margin:8px 0 16px;" placeholder="Ex: 3A">

      <label>Turno:</label>
      <select id="turno" style="width:100%; padding:12px; margin:8px 0 16px;">
        <option value="">Selecione o turno</option>
        <option value="Manhã">Manhã</option>
        <option value="Tarde">Tarde</option>
        <option value="Noite">Noite</option>
      </select>

      <label>Foto do aluno (rosto visível):</label>
      <input type="file" id="foto" accept="image/*" style="margin:10px 0 20px;">

      <button onclick="cadastrarAluno()" style="width:100%; padding:14px;">Cadastrar Aluno</button>
      <button onclick="fecharModal()" style="width:100%; margin-top:10px; background:#e5e7eb;">Fechar</button>
    </div>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // ==================== CONEXÃO COM SUPABASE ====================
    const supabaseUrl = 'https://aslcwuwijpehvhtkrahp.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzbGN3dXdpanBlaHZodGtyYWhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODI3NDQsImV4cCI6MjA5MTY1ODc0NH0.F8ac-a66w6TyNPtqR7jGaIYww-tQrJnkO44bxJOKDlw';

    const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
    const BUCKET_NAME = 'fotos-alunos';

    // ==================== FUNÇÕES DO MODAL ====================
    function abrirModal() {
      document.getElementById('modal').style.display = 'flex';
    }

    function fecharModal() {
      document.getElementById('modal').style.display = 'none';
    }

    async function cadastrarAluno() {
      const nome = document.getElementById('nome').value.trim();
      const cgm = document.getElementById('cgm').value.trim();
      const turma = document.getElementById('turma').value.trim().toUpperCase();
      const turno = document.getElementById('turno').value;
      const arquivoFoto = document.getElementById('foto').files[0];

      if (!nome || !cgm || !turma || !turno || !arquivoFoto) {
        alert("❌ Preencha todos os campos e escolha uma foto!");
        return;
      }

      try {
        const filePath = `alunos/${cgm}.jpg`;

        // Upload da foto
        const { error: uploadError } = await supabase.storage
          .from(BUCKET_NAME)
          .upload(filePath, arquivoFoto, { upsert: true });

        if (uploadError) throw new Error("Erro no upload: " + uploadError.message);

        // Salvar no banco
        const { error: dbError } = await supabase
          .from('alunos')
          .insert({ nome_aluno: nome, cgm: cgm, turma: turma, turno: turno, foto_path: filePath });

        if (dbError) throw new Error("Erro ao salvar: " + dbError.message);

        alert(`✅ Aluno ${nome} cadastrado com sucesso!`);
        fecharModal();
        document.getElementById('nome').value = '';
        document.getElementById('cgm').value = '';
      } catch (err) {
        console.error(err);
        alert("❌ Erro: " + err.message);
      }
    }

    async function carregarAlunos() {
      const { data, error } = await supabase.from('alunos').select('nome_aluno');
      const status = document.getElementById('status');
      if (error) status.textContent = "Erro ao carregar";
      else status.textContent = `${data ? data.length : 0} alunos cadastrados`;
    }
  </script>
</body>
</html>
